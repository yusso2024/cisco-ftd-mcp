#config-version=FGT60F-7.0.5-FW-build0123-230101:opmode=0:vdom=0

config system global
    set hostname "FGT-BRANCH-EDGE-01"
end

config system interface
    edit "wan1"
        set ip 198.51.100.10 255.255.255.248
        set allowaccess ping https ssh http telnet
    next
    edit "lan"
        set ip 10.20.10.1 255.255.255.0
        set allowaccess ping
    next
end

config firewall address
    edit "PAYMENT_SERVER"
        set subnet 10.20.10.50 255.255.255.255
    next
    edit "INTERNAL_NET"
        set subnet 10.20.10.0 255.255.255.0
    next
end

config firewall addrgrp
    edit "LEGACY_UNUSED"
        set comment "legacy not in use"
        set member "PAYMENT_SERVER"
    next
end

config firewall vip
    edit "VIP-PAYMENT"
        set extip 198.51.100.11
        set mappedip "10.20.10.50"
        set extintf "wan1"
    next
end

config firewall policy
    edit 1
        set name "ALLOW-ANY-ANY"
        set srcintf "wan1"
        set dstintf "lan"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
    edit 2
        set name "ALLOW-TELNET-TO-PAYMENT"
        set srcintf "wan1"
        set dstintf "lan"
        set srcaddr "all"
        set dstaddr "PAYMENT_SERVER"
        set action accept
        set schedule "always"
        set service "TELNET"
    next
end

config vpn ipsec phase1-interface
    edit "LEGACY-TUNNEL"
        set interface "wan1"
        set ike-version 2
        set proposal 3des-md5
        set dhgrp 2
        set remote-gw 203.0.113.200
        set psksecret ENC weakkey
    next
end

config log syslogd setting
    set status disable
end

config system snmp community
    edit 1
        set name "public"
    next
end

config system ntp
    set ntpsync enable
end

config system ntpserver
    edit 1
        set server "0.pool.ntp.org"
    next
end

config system admin
    edit "admin"
        set accprofile "super_admin"
    next
end
